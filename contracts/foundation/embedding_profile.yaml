schema_version: 1
chunker_version: "1.2.0"
profile_status: provisional_until_benchmark
active_profile: medium

embedding_model:
  name: BAAI/bge-m3
  tokenizer: BAAI/bge-m3
  tokenizer_family: SentencePiece / XLM-R
  vector_dimension: 1024
  maximum_model_tokens: 8192
  retrieval_modes:
    - dense
    - sparse
    - colbert

active_chunking_profile:
  target_tokens: 450
  minimum_tokens: 96
  hard_maximum_tokens: 1000
  overlap_tokens: 64
  code_window_target_tokens: 450
  code_window_max_lines: 40
  code_window_overlap_lines: 4

benchmark_method:
  round_1: dense_only_chunk_budget_sweep
  round_2: fixed_budget_hybrid_retrieval_test
  principle: change_one_variable_at_a_time

# Candidate prose budgets are preserved for the later benchmark. They are not
# selectable runtime profiles in M6D; only active_chunking_profile is complete.
benchmark_profiles:
  control:
    target_tokens: 200
    minimum_tokens: 64
    hard_maximum_tokens: 240
    overlap_tokens: 40
  small:
    target_tokens: 300
    minimum_tokens: 96
    hard_maximum_tokens: 600
    overlap_tokens: 64
  medium:
    target_tokens: 450
    minimum_tokens: 96
    hard_maximum_tokens: 1000
    overlap_tokens: 64
  large:
    target_tokens: 700
    minimum_tokens: 128
    hard_maximum_tokens: 1500
    overlap_tokens: 96

tokenizer_distribution:
  source_repository: https://huggingface.co/BAAI/bge-m3
  upstream_commit: 5617a9f61b028005a4858fdac845db406aefb181
  observed_license: MIT
  provenance_url: https://huggingface.co/BAAI/bge-m3/tree/5617a9f61b028005a4858fdac845db406aefb181
  external_bundle_required: true
  implicit_cache_allowed: false
  required_assets:
    - filename: tokenizer.json
      byte_size: 17098108
      sha256: 21106b6d7dab2952c1d496fb21d5dc9db75c28ed361a05f5020bbba27810dd08
  pinned_versions:
    # M6D uses the Rust fast-tokenizer file loader directly. The other two
    # pins preserve the compatible upstream tokenizer toolchain identity.
    transformers: "4.57.6"
    tokenizers: "0.22.2"
    sentencepiece: "0.2.2"
